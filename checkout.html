<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Mundo da Bebê Reborn</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Jost', sans-serif; background: #fafafa; color: #333; }

        .header {
            background: #fff;
            border-bottom: 1px solid #f0e0e8;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(255,182,193,0.15);
        }
        .header-voltar {
            color: #DAA520;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-lock {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #25D366;
            font-weight: 600;
        }

        /* PROGRESS */
        .progress-bar {
            background: #fff;
            padding: 16px 20px;
            border-bottom: 1px solid #f5f5f5;
        }
        .progress-steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            max-width: 400px;
            margin: 0 auto;
        }
        .step { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .step-circle {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem;
        }
        .step.done .step-circle { background: #25D366; color: #fff; }
        .step.active .step-circle { background: #FFB6C1; color: #fff; }
        .step:not(.active):not(.done) .step-circle { background: #eee; color: #999; }
        .step-label { font-size: 0.7rem; color: #999; text-align: center; }
        .step.active .step-label { color: #FFB6C1; font-weight: 600; }
        .step.done .step-label { color: #25D366; }
        .step-line { flex: 1; height: 2px; background: #eee; max-width: 60px; }
        .step-line.done { background: #25D366; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 16px;
        }

        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 28px;
            align-items: start;
        }

        /* FORMULÁRIOS */
        .secao {
            background: #fff;
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid #f5f5f5;
        }
        .secao-titulo {
            font-size: 1rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .secao-titulo i { color: #FFB6C1; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-row.tres { grid-template-columns: 1fr 1fr 1fr; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
        }
        input, select {
            border: 1.5px solid #eee;
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Jost', sans-serif;
            font-size: 0.92rem;
            color: #333;
            outline: none;
            transition: border 0.2s;
            background: #fff;
            width: 100%;
        }
        input:focus, select:focus { border-color: #FFB6C1; }
        input.error { border-color: #ff4444 !important; }

        /* STRIPE ELEMENTS */
        .stripe-element-wrap {
            border: 1.5px solid #eee;
            border-radius: 10px;
            padding: 13px 14px;
            transition: border 0.2s;
            background: #fff;
        }
        .stripe-element-wrap.focused { border-color: #FFB6C1; }
        .stripe-element-wrap.error { border-color: #ff4444; }

        .card-icons {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .card-icon {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            color: #666;
            font-weight: 600;
        }

        /* RESUMO LATERAL */
        .resumo-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #f5f5f5;
            position: sticky;
            top: 100px;
        }
        .resumo-titulo { font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: #333; }

        .resumo-item {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .resumo-item img {
            width: 52px; height: 52px;
            border-radius: 10px; object-fit: cover;
            flex-shrink: 0;
        }
        .resumo-item-info { flex: 1; min-width: 0; }
        .resumo-item-nome { font-size: 0.82rem; font-weight: 600; color: #333; line-height: 1.3; }
        .resumo-item-qtd { font-size: 0.75rem; color: #999; }
        .resumo-item-preco { font-size: 0.9rem; font-weight: 700; color: #FFB6C1; white-space: nowrap; }

        .resumo-linha {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; font-size: 0.88rem; color: #666;
        }
        .resumo-linha.total {
            font-size: 1.15rem; font-weight: 700; color: #333;
            border-top: 2px solid #f0e0e8; margin-top: 8px; padding-top: 14px;
        }
        .resumo-linha.total span:last-child { color: #FFB6C1; }

        .frete-badge {
            background: #f0fff4;
            color: #25D366;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* BOTÃO PAGAR */
        .btn-pagar {
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 18px rgba(218,165,32,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-pagar:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(218,165,32,0.5); }
        .btn-pagar:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* SPINNER */
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MENSAGEM ERRO */
        .payment-error {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.88rem;
            color: #cc0000;
            margin-top: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .seguranca-info {
            display: flex; flex-direction: column; gap: 6px;
            margin-top: 16px; padding-top: 16px;
            border-top: 1px solid #f5f5f5;
        }
        .seguranca-linha {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.75rem; color: #bbb;
        }
        .seguranca-linha i { color: #25D366; }

        /* MOBILE */
        @media (max-width: 768px) {
            .checkout-layout { grid-template-columns: 1fr; }
            .resumo-card { position: static; order: -1; }
            .form-row { grid-template-columns: 1fr; }
            .form-row.tres { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .container { padding: 16px 12px; }
            .secao { padding: 18px 14px; }
            .form-row.tres { grid-template-columns: 1fr; }
            .btn-pagar { padding: 15px; font-size: 0.97rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="carrinho.html" class="header-voltar"><i class="fas fa-arrow-left"></i> Carrinho</a>
    <a href="index.html"><img src="logo.png" alt="MBR" style="height:44px;"></a>
    <div class="header-lock"><i class="fas fa-lock"></i> Pagamento Seguro</div>
</header>

<div class="progress-bar">
    <div class="progress-steps">
        <div class="step done">
            <div class="step-circle"><i class="fas fa-check" style="font-size:0.75rem;"></i></div>
            <div class="step-label">Carrinho</div>
        </div>
        <div class="step-line done"></div>
        <div class="step active">
            <div class="step-circle">2</div>
            <div class="step-label">Dados</div>
        </div>
        <div class="step-line"></div>
        <div class="step active">
            <div class="step-circle">3</div>
            <div class="step-label">Pagamento</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-circle">4</div>
            <div class="step-label">Confirmação</div>
        </div>
    </div>
</div>

<div class="container">
    <div class="checkout-layout">

        <!-- COLUNA ESQUERDA: FORMULÁRIOS -->
        <div>
            <!-- DADOS PESSOAIS -->
            <div class="secao">
                <div class="secao-titulo"><i class="fas fa-user"></i> Dados Pessoais</div>
                <div style="display:flex; flex-direction:column; gap:14px;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nome completo *</label>
                            <input type="text" id="nome" placeholder="Seu nome completo">
                        </div>
                        <div class="form-group">
                            <label>E-mail *</label>
                            <input type="email" id="email" placeholder="seu@email.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Telefone / WhatsApp *</label>
                            <input type="tel" id="telefone" placeholder="(81) 99999-9999">
                        </div>
                        <div class="form-group">
                            <label>CPF</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ENDEREÇO -->
            <div class="secao">
                <div class="secao-titulo"><i class="fas fa-map-marker-alt"></i> Endereço de Entrega</div>
                <div style="display:flex; flex-direction:column; gap:14px;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>CEP *</label>
                            <input type="text" id="cep" placeholder="00000-000" maxlength="9" oninput="buscarCep(this)">
                        </div>
                        <div class="form-group">
                            <label>Estado</label>
                            <input type="text" id="estado" placeholder="PE" maxlength="2">
                        </div>
                    </div>
                    <div class="form-row full">
                        <div class="form-group">
                            <label>Rua / Logradouro *</label>
                            <input type="text" id="rua" placeholder="Rua das Flores">
                        </div>
                    </div>
                    <div class="form-row tres">
                        <div class="form-group">
                            <label>Número *</label>
                            <input type="text" id="numero" placeholder="123">
                        </div>
                        <div class="form-group">
                            <label>Complemento</label>
                            <input type="text" id="complemento" placeholder="Apto 4">
                        </div>
                        <div class="form-group">
                            <label>Bairro</label>
                            <input type="text" id="bairro" placeholder="Centro">
                        </div>
                    </div>
                    <div class="form-row full">
                        <div class="form-group">
                            <label>Cidade *</label>
                            <input type="text" id="cidade" placeholder="Recife">
                        </div>
                    </div>
                </div>
            </div>

            <!-- PAGAMENTO STRIPE -->
            <div class="secao">
                <div class="secao-titulo"><i class="fas fa-credit-card"></i> Pagamento</div>

                <div class="card-icons">
                    <span class="card-icon">Visa</span>
                    <span class="card-icon">Mastercard</span>
                    <span class="card-icon">Elo</span>
                    <span class="card-icon">American Express</span>
                    <span class="card-icon">Pix</span>
                </div>

                <div style="display:flex; flex-direction:column; gap:14px;">
                    <div class="form-group">
                        <label>Número do cartão</label>
                        <div class="stripe-element-wrap" id="cardNumberWrap">
                            <div id="cardNumber"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Validade</label>
                            <div class="stripe-element-wrap" id="cardExpiryWrap">
                                <div id="cardExpiry"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <div class="stripe-element-wrap" id="cardCvcWrap">
                                <div id="cardCvc"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="payment-error" id="paymentError">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="paymentErrorMsg"></span>
                </div>
            </div>
        </div>

        <!-- COLUNA DIREITA: RESUMO + BOTÃO PAGAR -->
        <div>
            <div class="resumo-card">
                <div class="resumo-titulo">Seu pedido</div>
                <div id="resumoItens"></div>

                <div style="margin-top:12px;">
                    <div class="resumo-linha">
                        <span>Subtotal</span>
                        <span id="resumoSubtotal">R$ 0,00</span>
                    </div>
                    <div class="resumo-linha">
                        <span>Frete</span>
                        <span class="frete-badge" id="freteBadge">🚚 Frete Grátis</span>
                    </div>
                    <div class="resumo-linha total">
                        <span>Total</span>
                        <span id="resumoTotal">R$ 0,00</span>
                    </div>
                </div>

                <button class="btn-pagar" id="btnPagar" onclick="processarPagamento()">
                    <div class="spinner" id="spinner"></div>
                    <i class="fas fa-lock" id="btnIcon"></i>
                    <span id="btnTexto">Pagar agora</span>
                </button>

                <div class="seguranca-info">
                    <div class="seguranca-linha"><i class="fas fa-shield-alt"></i> Pagamento 100% seguro — SSL</div>
                    <div class="seguranca-linha"><i class="fas fa-lock"></i> Seus dados são criptografados</div>
                    <div class="seguranca-linha"><i class="fab fa-stripe"></i> Processado pelo Stripe</div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // ======= CARRINHO =======
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const total = parseFloat(localStorage.getItem('carrinhoTotal') || '0');

    function formatarPreco(v) {
        return 'R$ ' + v.toFixed(2).replace('.', ',');
    }
    function precoNumerico(str) {
        return parseFloat(str.replace('R$','').replace(/\./g,'').replace(',','.').trim());
    }

    function renderResumo() {
        const subtotal = carrinho.reduce((a, i) => a + (precoNumerico(i.preco) * i.qtd), 0);
        const totalFinal = total > 0 ? total : subtotal;

        document.getElementById('resumoItens').innerHTML = carrinho.map(item => `
            <div class="resumo-item">
                <img src="${item.imagem}" alt="${item.titulo}" onerror="this.src='logo.png'">
                <div class="resumo-item-info">
                    <div class="resumo-item-nome">${item.titulo}</div>
                    <div class="resumo-item-qtd">Qtd: ${item.qtd}</div>
                </div>
                <div class="resumo-item-preco">${formatarPreco(precoNumerico(item.preco) * item.qtd)}</div>
            </div>
        `).join('');

        document.getElementById('resumoSubtotal').textContent = formatarPreco(subtotal);
        document.getElementById('resumoTotal').textContent = formatarPreco(totalFinal);
    }

    renderResumo();

    // ======= FRETE POR CIDADE =======
    const CIDADES_FRETE_GRATIS = ['recife','maceió','maceio','joão pessoa','joao pessoa'];

    function calcularFrete(cidade) {
        const c = (cidade || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        const gratis = CIDADES_FRETE_GRATIS.some(fc =>
            fc.normalize('NFD').replace(/[\u0300-\u036f]/g, '') === c
        );
        return gratis ? 0 : 0; // todas grátis por ora — adaptar se precisar cobrar
    }

    function textoFrete(cidade) {
        const c = (cidade || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        if (c === 'recife') return '🏠 Entrega Grátis em Recife';
        if (c === 'maceio' || c === 'maceió') return '🚚 Frete Grátis para Maceió';
        if (c === 'joao pessoa' || c === 'joão pessoa') return '🚚 Frete Grátis para João Pessoa';
        return '🚚 Frete Grátis para todo o Brasil';
    }

    function atualizarFrete() {
        const cidade = document.getElementById('cidade').value;
        const badge = document.getElementById('freteBadge');
        if (badge) badge.textContent = textoFrete(cidade);
    }

    // ======= CEP AUTO-PREENCHIMENTO =======
    async function buscarCep(input) {
        let val = input.value.replace(/\D/g, '');
        if (val.length > 5) val = val.slice(0,5) + '-' + val.slice(5,8);
        input.value = val;

        if (val.replace('-','').length === 8) {
            try {
                const res = await fetch(`https://viacep.com.br/ws/${val.replace('-','')}/json/`);
                const data = await res.json();
                if (!data.erro) {
                    document.getElementById('rua').value = data.logradouro || '';
                    document.getElementById('bairro').value = data.bairro || '';
                    document.getElementById('cidade').value = data.localidade || '';
                    document.getElementById('estado').value = data.uf || '';
                    document.getElementById('numero').focus();
                    atualizarFrete();
                }
            } catch(e) {}
        }
    }

    document.getElementById('cidade').addEventListener('input', atualizarFrete);

    // ======= MÁSCARAS =======
    document.getElementById('telefone').addEventListener('input', function() {
        let v = this.value.replace(/\D/g,'');
        if (v.length <= 10) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
        else v = v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
        this.value = v;
    });
    document.getElementById('cpf').addEventListener('input', function() {
        let v = this.value.replace(/\D/g,'');
        v = v.replace(/(\d{3})(\d)/,'$1.$2');
        v = v.replace(/(\d{3})(\d)/,'$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
        this.value = v;
    });

    // ======= STRIPE =======
    let stripeInstance, cardNumber, cardExpiry, cardCvc;

    async function setupStripe() {
        try {
            const res = await fetch('/.netlify/functions/get-config');
            const { stripeKey } = await res.json();
            stripeInstance = Stripe(stripeKey);
        } catch(e) {
            // fallback local: sem Stripe inicializado
            return;
        }

        const elements = stripeInstance.elements({
            locale: 'pt-BR',
            fonts: [{ cssSrc: 'https://fonts.googleapis.com/css2?family=Jost:wght@400;500&display=swap' }]
        });

        const elementStyle = {
            base: {
                fontFamily: 'Jost, sans-serif',
                fontSize: '15px',
                color: '#333',
                '::placeholder': { color: '#bbb' }
            },
            invalid: { color: '#ff4444' }
        };

        cardNumber = elements.create('cardNumber', { style: elementStyle, showIcon: true });
        cardExpiry = elements.create('cardExpiry', { style: elementStyle });
        cardCvc    = elements.create('cardCvc',    { style: elementStyle });

        cardNumber.mount('#cardNumber');
        cardExpiry.mount('#cardExpiry');
        cardCvc.mount('#cardCvc');

        [
            [cardNumber, 'cardNumberWrap'],
            [cardExpiry, 'cardExpiryWrap'],
            [cardCvc,    'cardCvcWrap']
        ].forEach(([el, wrapId]) => {
            el.on('focus', () => document.getElementById(wrapId).classList.add('focused'));
            el.on('blur',  () => document.getElementById(wrapId).classList.remove('focused'));
            el.on('change', ev => document.getElementById(wrapId).classList.toggle('error', !!ev.error));
        });
    }

    setupStripe();

    // ======= VALIDAÇÃO =======
    function validarCampos() {
        const obrigatorios = ['nome','email','telefone','cep','rua','numero','cidade'];
        let ok = true;
        obrigatorios.forEach(id => {
            const el = document.getElementById(id);
            if (!el.value.trim()) { el.classList.add('error'); ok = false; }
            else el.classList.remove('error');
        });
        return ok;
    }

    // ======= PROCESSAR PAGAMENTO =======
    async function processarPagamento() {
        if (!validarCampos()) { mostrarErro('Preencha todos os campos obrigatórios.'); return; }
        if (!stripeInstance || !cardNumber) { mostrarErro('Stripe não carregado. Recarregue a página.'); return; }

        setCarregando(true);
        esconderErro();

        const totalFinal = parseFloat(localStorage.getItem('carrinhoTotal') || '0');
        const customer = {
            nome:     document.getElementById('nome').value,
            email:    document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            cidade:   document.getElementById('cidade').value
        };

        try {
            // 1. Cria Payment Intent
            const res = await fetch('/.netlify/functions/create-payment-intent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: totalFinal, items: carrinho, customer })
            });
            const { clientSecret, error: serverError } = await res.json();
            if (serverError) throw new Error(serverError);

            // 2. Confirma pagamento
            const { error, paymentIntent } = await stripeInstance.confirmCardPayment(clientSecret, {
                payment_method: {
                    card: cardNumber,
                    billing_details: {
                        name: customer.nome,
                        email: customer.email,
                        phone: customer.telefone,
                        address: {
                            line1: document.getElementById('rua').value + ', ' + document.getElementById('numero').value,
                            city: customer.cidade,
                            state: document.getElementById('estado').value,
                            postal_code: document.getElementById('cep').value.replace('-',''),
                            country: 'BR'
                        }
                    }
                },
                receipt_email: customer.email
            });

            if (error) throw new Error(error.message);

            // 3. Sucesso
            if (paymentIntent.status === 'succeeded') {
                localStorage.setItem('pedidoId', paymentIntent.id);
                localStorage.setItem('pedidoCliente', JSON.stringify(customer));
                localStorage.setItem('totalPago', totalFinal);
                localStorage.setItem('carrinhoSnapshot', localStorage.getItem('carrinho') || '[]');
                window.location.href = 'aprovacao.html';
            }

        } catch (err) {
            mostrarErro(err.message || 'Erro ao processar pagamento. Tente novamente.');
            setCarregando(false);
        }
    }

    function setCarregando(sim) {
        const btn = document.getElementById('btnPagar');
        document.getElementById('spinner').style.display = sim ? 'block' : 'none';
        document.getElementById('btnIcon').style.display  = sim ? 'none' : 'inline';
        document.getElementById('btnTexto').textContent   = sim ? 'Processando...' : 'Pagar agora';
        btn.disabled = sim;
    }

    function mostrarErro(msg) {
        const el = document.getElementById('paymentError');
        document.getElementById('paymentErrorMsg').textContent = msg;
        el.style.display = 'flex';
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function esconderErro() { document.getElementById('paymentError').style.display = 'none'; }

    document.querySelectorAll('input').forEach(i => i.addEventListener('input', () => i.classList.remove('error')));
</script>
</body>
</html>
